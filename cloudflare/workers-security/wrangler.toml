name = "workers-security"
main = "src/index.ts" 
compatibility_date = "2024-01-01" 
compatibility_flags = ["nodejs_compat"] 

# KV Namespace for rate limiting 
[[kv_namespaces]]
binding = "RATE_LIMIT_KV" 
id = "your-kv-namespace-id" 
preview_id = "your-preview-kv-namespace-id" 

# D1 Database for advanced rate limiting (optional)
# [[d1_databases]]
# binding = "DB" 
# database_name = "rate-limit-db" 
# database_id = "your-database-id-here" 

# Environment variables 
[vars] 
ENVIRONMENT = "development"
TURNSTILE_ENABLED = "false" 

# Production environment 
[env.production] 
name = "workers-security-prod" 

[env.production.vars] 
ENVIRONMENT = "production"
TURNSTILE_ENABLED = "true"
# TURNSTILE_SECRET_KEY will be added via: wrangler secret put TURNSTILE_SECRET_KEY