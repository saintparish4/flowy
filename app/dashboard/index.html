<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hexa — DeFi API Security Dashboard</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #0f1117;
        color: #e2e8f0;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }
      .container { text-align: center; max-width: 480px; padding: 2rem; }
      .badge {
        display: inline-block;
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 9999px;
        padding: 0.25rem 0.75rem;
        font-size: 0.75rem;
        letter-spacing: 0.05em;
        color: #94a3b8;
        margin-bottom: 1.5rem;
      }
      h1 { font-size: 2rem; font-weight: 700; letter-spacing: -0.025em; margin-bottom: 0.75rem; }
      h1 span { color: #6366f1; }
      p { color: #64748b; line-height: 1.6; margin-bottom: 2rem; }
      .phases { display: flex; gap: 0.5rem; flex-wrap: wrap; justify-content: center; }
      .phase {
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 0.375rem;
        padding: 0.25rem 0.625rem;
        font-size: 0.75rem;
        color: #64748b;
      }
      .phase.done { border-color: #4ade80; color: #4ade80; }
      .phase.active { border-color: #6366f1; color: #818cf8; }
    </style>
  </head>
  <body>
    <div class="container">
      <span class="badge">Phase 8 — Coming Soon</span>
      <h1><span>Hexa</span> Dashboard</h1>
      <p>
        The enterprise SaaS dashboard is built in Phase 8 as a Vite/React SPA
        deployed via Cloudflare Pages. Real-time request telemetry, threat score
        histograms, and compliance exports will live here.

      </p>
      <div class="phases">
        <span class="phase done">Phase 1 ✓</span>
        <span class="phase active">Phase 2</span>
        <span class="phase">Phase 3</span>
        <span class="phase">Phase 4</span>
        <span class="phase">Phase 5</span>
        <span class="phase">Phase 6</span>
        <span class="phase">Phase 7</span>
        <span class="phase">Phase 8</span>
      </div>
    </div>
  </body>
</html>
