name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # TypeScript: lint, type-check, unit tests
  # ---------------------------------------------------------------------------
  worker:
    name: Worker (lint · typecheck · test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/worker

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Wrangler deploy dry-run
        run: npx wrangler deploy --dry-run --outdir /tmp/worker-dist
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  # ---------------------------------------------------------------------------
  # Rust: cargo test + WASM binary size check
  # ---------------------------------------------------------------------------
  detector:
    name: Detector (cargo test · WASM size)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/detector

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/detector/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('packages/detector/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: cargo test (native)
        run: cargo test

      - name: cargo build --target wasm32-unknown-unknown (release)
        run: cargo build --target wasm32-unknown-unknown --release

      - name: Enforce WASM binary size < 500KB
        run: |
          WASM_PATH="target/wasm32-unknown-unknown/release/hexa_detector.wasm"
          SIZE=$(stat -c%s "$WASM_PATH")
          echo "WASM binary size: ${SIZE} bytes"
          if [ "$SIZE" -gt 512000 ]; then
            echo "ERROR: WASM binary exceeds 500KB limit (${SIZE} bytes)"
            exit 1
          fi

  # ---------------------------------------------------------------------------
  # Gate: both jobs must pass before merge is allowed
  # ---------------------------------------------------------------------------
  ci-gate:
    name: CI Gate
    needs: [worker, detector]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [ "${{ needs.worker.result }}" != "success" ] || \
             [ "${{ needs.detector.result }}" != "success" ]; then
            echo "One or more CI jobs failed"
            exit 1
          fi
          echo "All CI jobs passed"
